# Library service Deployment.
#
# Migration strategy: option 2 — an initContainer runs `atlas migrate apply`
# against LIBRARY_DATABASE_URL *before* the app container starts. The init
# image (test-n-design-go-migrations) is built from Dockerfile.migrations and
# carries the versioned migration directory.
#
# atlas migrate apply is idempotent: it records applied versions in the
# atlas_schema_revisions table and only runs what is pending. So it is safe for
# the initContainer to run on every pod start / restart / scale-up — already-
# applied migrations are skipped.
#
# Caveat: with replicas > 1, multiple pods can start their initContainers at
# once on a first rollout and race to apply the same migration. atlas takes a
# Postgres advisory lock for the duration of apply, so concurrent runs serialize
# rather than corrupt — the losers wait, then find nothing pending. If you would
# rather avoid the lock contention entirely, switch to a Helm pre-upgrade Job.
#
# Expand/contract: the initContainer applies the NEW schema before NEW app pods
# start, while OLD app pods may still be serving. Keep each migration backward-
# compatible with the previously deployed app version (add columns/tables first;
# drop or rename in a later release).
#
# Replace REGISTRY and TAG with your image registry and the release tag. The app
# image and the migrations image must be built from the SAME commit so the
# binary's expected schema matches the migrations being applied.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: library
  labels:
    app: library
spec:
  replicas: 2
  selector:
    matchLabels:
      app: library
  template:
    metadata:
      labels:
        app: library
    spec:
      initContainers:
        - name: migrate
          image: REGISTRY/test-n-design-go-migrations:TAG
          # Override the image's `atlas` entrypoint args. $(VAR) is expanded by
          # Kubernetes from this container's own env, so LIBRARY_DATABASE_URL
          # must be declared below.
          command:
            - atlas
            - migrate
            - apply
            - --url
            - $(LIBRARY_DATABASE_URL)
            - --dir
            - file:///migrations
          env:
            - name: LIBRARY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: library-secrets
                  key: database-url
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
      containers:
        - name: library
          image: REGISTRY/test-n-design-go:TAG
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: LIBRARY_HTTP_PORT
              value: "3000"
            - name: LIBRARY_LOG_FORMAT
              value: json
            - name: LIBRARY_LOG_LEVEL
              value: info
            - name: LIBRARY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: library-secrets
                  key: database-url
            - name: LIBRARY_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: library-secrets
                  key: redis-url
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: library
  labels:
    app: library
spec:
  selector:
    app: library
  ports:
    - name: http
      port: 80
      targetPort: http
---
# Example Secret — DO NOT commit real credentials. Create it out-of-band
# (sealed-secrets, external-secrets, or `kubectl create secret`) in production:
#
#   kubectl create secret generic library-secrets \
#     --from-literal=database-url='postgres://library:PASS@postgres:5432/library?sslmode=disable' \
#     --from-literal=redis-url='redis://redis:6379/0'
apiVersion: v1
kind: Secret
metadata:
  name: library-secrets
type: Opaque
stringData:
  database-url: postgres://library:library@postgres:5432/library?sslmode=disable
  redis-url: redis://redis:6379/0
